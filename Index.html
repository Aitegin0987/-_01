<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safari Game Club Karakol</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:40px;
  background:linear-gradient(90deg,#00f7ff,#ff00cc);
}

header h1{
  margin:0;
}

.btn{
  padding:12px 18px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:#16a34a;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:220px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

/* FORM */
.form{
  max-width:400px;
  margin:20px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

/* MAP */
.map{
  text-align:center;
  padding:30px;
}

iframe{
  width:100%;
  height:320px;
  border:none;
  border-radius:12px;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111827;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
  font-size:20px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <h1>🎮 Safari Game Club</h1>
  <p>24/7 | Каракол | Кыштобаева 31</p>

  <button class="btn" onclick="showPopup()">📞 Байланыш</button>
  <button class="btn" onclick="location.href='tel:0701111611'">📲 Чалуу</button>
</header>

<!-- PRICES -->
<section class="cards">

  <div class="card">
    <h3>🚗 Авто сим</h3>
    <p>250 сом</p>
    <button class="btn" onclick="order('Авто сим')">Заказ берүү</button>
  </div>

  <div class="card">
    <h3>🎮 PS5</h3>
    <p>250 сом</p>
    <button class="btn" onclick="order('PS5')">Заказ берүү</button>
  </div>

  <div class="card">
    <h3>⚽ FIFA 24</h3>
    <p>250 сом</p>
    <button class="btn" onclick="order('FIFA 24')">Заказ берүү</button>
  </div>

</section>

<!-- FORM -->
<div class="form">
  <h3>🧾 Бронь кылуу</h3>

  <input id="name" placeholder="Атың">
  <input id="phone" placeholder="Телефон">
  <input id="game" placeholder="Оюн">

  <button class="btn" onclick="sendOrder()">WhatsApp менен жөнөтүү</button>
</div>

<!-- MAP -->
<section class="map">
  <h2>📍 Биздин жайгашуу</h2>

  <iframe src="https://www.google.com/maps?q=Karakol%20Kyshtobaeva%2031&output=embed"></iframe>

  <p>Каракол, Кыштобаева 31</p>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h2>📞 Байланыш</h2>
    <p>0701 111 611</p>
    <button class="btn" onclick="closePopup()">Жабуу</button>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/996701111611">💬</a>

<script>

// POPUP
function showPopup(){
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

// ORDER ALERT
function order(game){
  alert("🔥 Сиз тандадыңыз: " + game + "\n📞 0701 111 611");
}

// WHATSAPP FORM
function sendOrder(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let game=document.getElementById("game").value;

  if(name==""||phone==""){
    alert("Толтуруңуз!");
    return;
  }

  let msg=`Салам!%0AАты: ${name}%0AТел: ${phone}%0AОюн: ${game}`;

  window.open("https://wa.me/996701111611?text="+msg);
}

</script>

</body>
</html>
